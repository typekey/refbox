# Reference resource registry for rbrowser (refbox).
#
# Layout:  species -> assembly -> resource_name -> {local_path?, url?}
#
# Per-resource rules:
#   - local_path exists -> copied to {Species}/{Assembly}/raw/
#   - elif url is set   -> downloaded to {Species}/{Assembly}/raw/
#   - elif null         -> skipped silently
#
# Canonical resource names (file extension shown):
#   genome           .fa     primary chromosome FASTA
#   transcriptome    .fa     transcript FASTA
#   annotation_gtf   .gtf    gene model GTF
#   annotation_gff3  .gff3   gene model GFF3
#   repeats_rmsk     .tsv    UCSC rmsk.txt.gz raw table (canonical source)
#   repeats_bed      .bed    derived BED (NULL url -> built from repeats_rmsk)
#   repeats_gtf      .gtf    derived GTF (NULL url -> built from repeats_rmsk)
#   repeats_fa       .fa     UCSC RepeatMasker .fa.out.gz (alignment-style)
#   rnacentral       .gff3   RNAcentral genome_coordinates GFF3
#   ccre             .bed    ENCODE SCREEN cCREs
#
# Common URL templates:
#   GENCODE human     https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/release_{V}/...
#   GENCODE mouse     https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_mouse/release_{V}/...
#   Ensembl           https://ftp.ensembl.org/pub/release-{V}/{type}/{species}/...
#   Ensembl Plants    https://ftp.ensemblgenomes.org/pub/plants/release-{V}/...
#   Ensembl Metazoa   https://ftp.ensemblgenomes.org/pub/metazoa/release-{V}/...
#   Ensembl Fungi     https://ftp.ensemblgenomes.org/pub/fungi/release-{V}/...
#   Ensembl Bacteria  https://ftp.ensemblgenomes.org/pub/bacteria/release-{V}/...
#   UCSC bigZips      https://hgdownload.soe.ucsc.edu/goldenPath/{db}/bigZips/{db}.fa.gz
#                     https://hgdownload.soe.ucsc.edu/goldenPath/{db}/bigZips/{db}.fa.out.gz
#                     https://hgdownload.soe.ucsc.edu/goldenPath/{db}/database/rmsk.txt.gz
#   RNAcentral GFF3   https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/genome_coordinates/gff3/{species_lower}.{Assembly}.gff3.gz

